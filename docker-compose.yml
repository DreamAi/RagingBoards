version: "3.9"

services:
  db:
    image: postgres:15
    container_name: raging-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragingboards
    ports:
      - "5432:5432"

  api:
    build: ./apps/api
    ports:
      - "4000:4000"
    depends_on:
      - db

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api
